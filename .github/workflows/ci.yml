name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JN_TEST_SNAPSHOT_PATH: ${{ github.workspace }}/.ci/snapshot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Check out pinned public engine fixture
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: alexscott2718-gif/jn-engine
          ref: 925242073a771aa68996c294aec8cc41cb43a0ef
          path: .ci/jn-engine-source
          persist-credentials: false
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y ripgrep
          python -m pip install --constraint requirements.lock -e '.[test]'
      - name: Build immutable engine test snapshot
        shell: bash
        run: |
          set -euo pipefail
          commit=925242073a771aa68996c294aec8cc41cb43a0ef
          mkdir -p "$JN_TEST_SNAPSHOT_PATH/content"
          git -C .ci/jn-engine-source archive "$commit" \
            | tar -x -C "$JN_TEST_SNAPSHOT_PATH/content"
          tree=$(git -C .ci/jn-engine-source rev-parse "$commit^{tree}")
          commit_time=$(git -C .ci/jn-engine-source show -s --format=%cI "$commit")
          python -m deploy.export_snapshot \
            --snapshot "$JN_TEST_SNAPSHOT_PATH" \
            --commit "$commit" \
            --tree "$tree" \
            --commit-time "$commit_time"
          chmod -R a-w "$JN_TEST_SNAPSHOT_PATH"
      - name: Run full test suite
        run: python -m pytest -q
      - name: Check public tree for identity and infrastructure leaks
        run: python -m scripts.check_public_tree
