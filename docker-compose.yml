services:
  gateway:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      API_PORT: 8788
      JN_SNAPSHOT_PATH: /data/jn-engine
      GATEWAY_SECRETS_DIR: /secrets
    ports:
      - "127.0.0.1:${PUBLISHED_API_PORT:-8788}:8788"
    volumes:
      - type: bind
        source: ${JN_SNAPSHOT_HOST_PATH:?set a versioned immutable snapshot path}
        target: /data/jn-engine
        read_only: true
      - type: bind
        source: ${GATEWAY_SECRETS_HOST_PATH:?set the mode-0700 secrets path}
        target: /secrets
      - type: bind
        source: ${GATEWAY_AUDIT_HOST_PATH:?set the mode-0700 audit path}
        target: /audit
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:?set an image pinned by sha256 digest}
    profiles: ["tunnel"]
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    command: ["tunnel", "--config", "/etc/cloudflared/config.yml", "run"]
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
